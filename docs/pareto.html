<!doctype html>
<meta charset="utf-8"><title>tokenbench — reduction vs fidelity</title>
<body style="font-family:system-ui;max-width:900px;margin:2rem auto">
<h2>tokenbench — reduction vs fidelity (measured)</h2>
<p>Each dot = one tool on one content lane. Top-right = ideal (small + faithful).
Data: <code>docs/matrix_data.json</code>, regenerated by <code>make_matrix.py</code>.</p>
<div style="position:relative;height:520px"><canvas id="c"></canvas></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const COLORS={baseline:"#888780",headroom:"#1baf7a",toon:"#0f6e56","claw-compactor":"#eb6834",
  rtk:"#7f77dd","llmlingua@0.5":"#eda100","llmlingua@0.33":"#e34948","selective-context":"#d4537e"};
fetch("matrix_data.json").then(r=>r.json()).then(data=>{
  const ds=Object.entries(data).map(([tool,lanes])=>({
    label:tool,
    data:Object.entries(lanes).filter(([,v])=>v.red!=null&&v.fid!=null)
      .map(([lane,v])=>({x:v.red,y:v.fid,lane})),
    backgroundColor:COLORS[tool]||"#378add",pointRadius:7,pointHoverRadius:9}));
  new Chart(document.getElementById("c"),{type:"scatter",data:{datasets:ds},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{tooltip:{callbacks:{label:c=>`${c.dataset.label} · ${c.raw.lane}: ${c.raw.x}% smaller, ${c.raw.y}% fidelity`}}},
      scales:{x:{title:{display:true,text:"reduction %"},min:-5,max:105},
              y:{title:{display:true,text:"worst-case needle fidelity %"},min:-5,max:105}}}});
});
</script>
</body>
